name: CI / Typecheck

on:
  workflow_call:

permissions:
  contents: read

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up workspace
        uses: ./.github/actions/setup-pnpm
        with:
          github-token: ${{ github.token }}

      - name: Run typecheck
        run: pnpm build && pnpm typecheck
