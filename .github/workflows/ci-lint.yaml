name: CI / Lint

on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up workspace
        uses: ./.github/actions/setup-pnpm
        with:
          github-token: ${{ github.token }}

      - name: Run workspace lint
        run: pnpm lint

      - name: Run config lint
        run: pnpm --filter @dathra/config lint

      - name: Run workspace type-aware lint
        run: pnpm lint:type-aware

      - name: Run config type-aware lint
        run: pnpm --filter @dathra/config lint:type-aware
