<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dathomir E2E SSR Fixtures</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, sans-serif;
        background: #f4f7f5;
        color: #173127;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      #app {
        max-width: 900px;
        margin: 0 auto;
        padding: 32px 20px 56px;
      }

      main {
        display: grid;
        gap: 20px;
      }

      section,
      article {
        padding: 20px;
        border-radius: 18px;
        border: 1px solid rgba(23, 49, 39, 0.12);
        background: rgba(255, 255, 255, 0.92);
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 10px 16px;
        background: #21473c;
        color: #f6fbf8;
        cursor: pointer;
        font: inherit;
      }

      code {
        padding: 2px 6px;
        border-radius: 999px;
        background: rgba(33, 71, 60, 0.08);
      }
    </style>
    <script type="module" src="/src/entry-client.ts"></script>
  </head>
  <body>
    <div id="app"><!--ssr-outlet--></div>
  </body>
</html>
